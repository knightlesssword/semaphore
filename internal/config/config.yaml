server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout_seconds: 15

admin:
  enabled: false         # set true to start the admin server on :9090
  port: 9090
  token: "test-admin-token"

auth:
  bypass: false        # set true to skip auth entirely (local dev only)
  static_keys:         # Phase 3: valid Bearer tokens; Phase 5 moves this to Postgres
    - "dev-key-local"

proxy:
  default_provider: "anthropic"
  timeout_seconds: 120
  providers:
    openai:
      base_url: "https://api.openai.com"
      api_key: ""        # set via SEMAPHORE_PROXY_PROVIDERS_OPENAI_API_KEY or here
    anthropic:
      base_url: "https://api.anthropic.com"
      api_key: ""        # set via SEMAPHORE_PROXY_PROVIDERS_ANTHROPIC_API_KEY or here
      default_model: "claude-sonnet-4-6"  # overrides whatever model the client sends
    ollama:
      base_url: "http://localhost:11434"
      default_model: ""  # e.g. "llama3.2" — leave empty to use client-supplied model

rate_limit:
  enabled: false                # set true to enforce limits (requires Redis)
  requests_per_minute: 60       # default limit applied to all keys
  tokens_per_day: 0             # 0 = unlimited; enforced in Phase 5 (needs token counts)
  # Named tiers (optional overrides — wired to keys in Phase 5/9):
  # tiers:
  #   free:
  #     requests_per_minute: 20
  #     tokens_per_day: 10000
  #   pro:
  #     requests_per_minute: 120
  #     tokens_per_day: 500000

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

postgres:
  enabled: false   # set true to enable audit logging + PostgresKeyStore (requires running Postgres)
  dsn: "postgres://semaphore:semaphore@localhost:5432/semaphore?sslmode=disable"

log:
  level: "info"   # debug | info | warn | error
  format: "text"  # text | json
